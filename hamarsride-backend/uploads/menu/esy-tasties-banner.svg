  <text x="110" y="495" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#f59e0b">Snack • Small Chops • Saturday Special</text>
  <text x="110" y="560" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#f3f4f6">Now available for delivery on HamarsRide</text>
