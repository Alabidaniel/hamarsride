<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Delight Restaurant</title>
  <desc id="desc">Banner image for Delight Restaurant on HamarsRide.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fafc" />
      <stop offset="55%" stop-color="#dbeafe" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)" />
  <rect x="120" y="90" width="960" height="520" rx="36" fill="#ffffff" />
  <rect x="180" y="170" width="620" height="74" rx="20" fill="#1e3a8a" />
  <text x="210" y="220" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#ffffff">Delight Restaurant</text>
  <text x="210" y="310" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="800" fill="#1e3a8a">Staples • Proteins • Soup / Swallow</text>
  <text x="210" y="380" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#475569">Complete meal options now available on HamarsRide</text>
  <text x="210" y="465" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#1e3a8a">Rice varieties, proteins, soups, and swallow options</text>
  <circle cx="955" cy="235" r="82" fill="#dbeafe" />
  <circle cx="955" cy="235" r="52" fill="#1e3a8a" fill-opacity="0.14" />
  <circle cx="915" cy="485" r="100" fill="#93c5fd" fill-opacity="0.45" />
</svg>
