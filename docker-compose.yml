services:
  mysql:
    image: mysql:8.4
    container_name: hamarsride-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Daniel@2007}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hamarsride}
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  user-backend:
    build:
      context: ./hamarsride-user/hamarsride-backend
    container_name: hamarsride-user-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD_URLENCODED:-Daniel2007}@mysql:3306/${MYSQL_DATABASE:-hamarsride}
      CORS_ORIGINS: ${USER_CORS_ORIGINS:-http://localhost:3000}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/serviceAccountKey.json
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      PAYMENT_BANK_NAME: ${PAYMENT_BANK_NAME:-OPay}
      PAYMENT_ACCOUNT_NAME: ${PAYMENT_ACCOUNT_NAME:-HAMARS RIDES AND TRANSPORT SERVICES}
      PAYMENT_ACCOUNT_NUMBER: ${PAYMENT_ACCOUNT_NUMBER:-6115535987}
      USER_UPLOADS_DIR: /app/uploads
    depends_on:
      - mysql
    ports:
      - "5000:5000"
    volumes:
      - ./serviceAccountKey.json:/run/secrets/serviceAccountKey.json:ro
      - user_uploads:/app/uploads

  admin-backend:
    build:
      context: ./hamarsride-admin/hamarsride-admin-backend
    container_name: hamarsride-admin-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5501
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD_URLENCODED:-Daniel2007}@mysql:3306/${MYSQL_DATABASE:-hamarsride}
      CORS_ORIGINS: ${ADMIN_CORS_ORIGINS:-http://localhost:3001}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/serviceAccountKey.json
      ADMIN_UPLOADS_DIR: /app/uploads
    depends_on:
      - mysql
    ports:
      - "5501:5501"
    volumes:
      - ./serviceAccountKey.json:/run/secrets/serviceAccountKey.json:ro
      - admin_uploads:/app/uploads

  user-frontend:
    build:
      context: ./hamarsride-user/HamarsRide
      args:
        VITE_API_BASE_URL: ${USER_API_BASE_URL:-http://localhost:5000/api}
    container_name: hamarsride-user-frontend
    restart: unless-stopped
    depends_on:
      - user-backend
    ports:
      - "3000:80"

  admin-frontend:
    build:
      context: ./hamarsride-admin/hamarsride-admin-frontend
      args:
        VITE_API_BASE_URL: ${ADMIN_API_BASE_URL:-http://localhost:5501}
    container_name: hamarsride-admin-frontend
    restart: unless-stopped
    depends_on:
      - admin-backend
    ports:
      - "3001:80"

volumes:
  mysql_data:
  user_uploads:
  admin_uploads:
